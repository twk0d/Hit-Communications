services:
  postgres:
    image: postgres:16-alpine
    container_name: hit-communications-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hit_incidents
      POSTGRES_USER: hit
      POSTGRES_PASSWORD: hit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hit -d hit_incidents']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles:
      - api
    build:
      context: .
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://hit:hit@postgres:5432/hit_incidents?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-development}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
