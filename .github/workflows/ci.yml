name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hit_incidents
          POSTGRES_USER: hit
          POSTGRES_PASSWORD: hit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hit -d hit_incidents"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://hit:hit@localhost:5432/hit_incidents?schema=public
      DATABASE_URL_TEST: postgresql://hit:hit@localhost:5432/hit_incidents?schema=e2e_ci
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: E2E Tests
        run: npm run test:e2e
